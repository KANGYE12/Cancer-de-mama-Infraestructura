name: Hospital CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write  # Necesario para que el test-reporter publique resultados

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Dar permisos al script de Maven
        run: chmod +x mvnw

      - name: Compilar
        run: ./mvnw compile --no-transfer-progress

      - name: Ejecutar Tests (Unitarios e Integración)
        run: ./mvnw verify --no-transfer-progress

      - name: Publicar Reporte de Tests
        uses: dorny/test-reporter@v1
        if: always() # Para que se ejecute aunque fallen los tests
        with:
          name: Reporte de Pruebas Integración
          path: '**/target/failsafe-reports/*.xml'
          reporter: java-junit

      - name: Generar Badge de Cobertura (Jacoco)
        uses: cicirello/jacoco-badge-generator@v2
        with:
          generate-branches-badge: true
          jacoco-csv-file: target/site/jacoco/jacoco.csv